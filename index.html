<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0">
    <title>The LIGA WC26 | Tournament Dashboard</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- App State Engine (Defined BEFORE Alpine loads to prevent ReferenceErrors) -->
    <script>
        function tournamentApp() {
            return {
                activeTab: 'standings',
                teams: [
                    { id: 1, name: 'Germany', player: 'Reeshad', group: 'A' },
                    { id: 2, name: 'France', player: 'UltNB', group: 'A' },
                    { id: 3, name: 'England', player: 'Mahee', group: 'A' },
                    { id: 4, name: 'Brazil', player: 'Nino', group: 'A' },
                    { id: 5, name: 'Spain', player: 'OnionLarper', group: 'B' },
                    { id: 6, name: 'Portugal', player: 'Tassin', group: 'B' },
                    { id: 7, name: 'Netherlands', player: 'Aymaan', group: 'B' },
                    { id: 8, name: 'Argentina', player: 'Anas', group: 'B' }
                ],
                matches: [
                    // GROUP A FIXTURES
                    { id: 101, round: 1, homeId: 1, awayId: 4, played: false, homeScore: 0, awayScore: 0, stats: { homePossession: 50, awayPossession: 50, homeShots: 0, awayShots: 0, homeShotsOnTarget: 0, awayShotsOnTarget: 0, homePasses: 0, awayPasses: 0, homeSuccessfulPasses: 0, awaySuccessfulPasses: 0, homeYellowCards: 0, homeRedCards: 0, awayYellowCards: 0, awayRedCards: 0 } },
                    { 
                        id: 102, 
                        round: 1, 
                        homeId: 2, 
                        awayId: 3, 
                        played: true, 
                        homeScore: 1, 
                        awayScore: 2, 
                        stats: { 
                            homePossession: 42, 
                            awayPossession: 58, 
                            homeShots: 8, 
                            awayShots: 3, 
                            homeShotsOnTarget: 6, 
                            awayShotsOnTarget: 3, 
                            homePasses: 54, 
                            awayPasses: 116, 
                            homeSuccessfulPasses: 34, 
                            awaySuccessfulPasses: 91, 
                            homeYellowCards: 0, 
                            homeRedCards: 0, 
                            awayYellowCards: 0, 
                            awayRedCards: 0 
                        } 
                    }, // England 2-1 France (France is home, England is away)
                    { id: 103, round: 2, homeId: 1, awayId: 3, played: false, homeScore: 0, awayScore: 0, stats: { homePossession: 50, awayPossession: 50, homeShots: 0, awayShots: 0, homeShotsOnTarget: 0, awayShotsOnTarget: 0, homePasses: 0, awayPasses: 0, homeSuccessfulPasses: 0, awaySuccessfulPasses: 0, homeYellowCards: 0, homeRedCards: 0, awayYellowCards: 0, awayRedCards: 0 } },
                    { id: 104, round: 2, homeId: 2, awayId: 4, played: false, homeScore: 0, awayScore: 0, stats: { homePossession: 50, awayPossession: 50, homeShots: 0, awayShots: 0, homeShotsOnTarget: 0, awayShotsOnTarget: 0, homePasses: 0, awayPasses: 0, homeSuccessfulPasses: 0, awaySuccessfulPasses: 0, homeYellowCards: 0, homeRedCards: 0, awayYellowCards: 0, awayRedCards: 0 } },
                    { id: 105, round: 3, homeId: 1, awayId: 2, played: false, homeScore: 0, awayScore: 0, stats: { homePossession: 50, awayPossession: 50, homeShots: 0, awayShots: 0, homeShotsOnTarget: 0, awayShotsOnTarget: 0, homePasses: 0, awayPasses: 0, homeSuccessfulPasses: 0, awaySuccessfulPasses: 0, homeYellowCards: 0, homeRedCards: 0, awayYellowCards: 0, awayRedCards: 0 } },
                    { 
                        id: 106, 
                        round: 3, 
                        homeId: 4, 
                        awayId: 3, 
                        played: true, 
                        homeScore: 3, 
                        awayScore: 4, 
                        stats: { 
                            homePossession: 56, 
                            awayPossession: 44, 
                            homeShots: 6, 
                            awayShots: 3, 
                            homeShotsOnTarget: 4, 
                            awayShotsOnTarget: 3, 
                            homePasses: 87, 
                            awayPasses: 83, 
                            homeSuccessfulPasses: 70, 
                            awaySuccessfulPasses: 65, 
                            homeYellowCards: 0, homeRedCards: 0, awayYellowCards: 0, awayRedCards: 0 
                        } // Brazil 3-2 England (Brazil is home, England is away)
                    },

                    // GROUP B FIXTURES
                    { 
                        id: 201, 
                        round: 1, 
                        homeId: 5, 
                        awayId: 8, 
                        played: true, 
                        homeScore: 0, 
                        awayScore: 1, 
                        stats: { 
                            homePossession: 34, 
                            awayPossession: 66, 
                            homeShots: 0, 
                            awayShots: 8, 
                            homeShotsOnTarget: 0, 
                            awayShotsOnTarget: 4, 
                            homePasses: 56, 
                            awayPasses: 134, 
                            homeSuccessfulPasses: 30, 
                            awaySuccessfulPasses: 112, 
                            homeYellowCards: 0, 
                            homeRedCards: 0, 
                            awayYellowCards: 0, 
                            awayRedCards: 0 
                        } 
                    }, // Argentina 1-0 Spain (Spain is home, Argentina is away)
                    { 
                        id: 202, 
                        round: 1, 
                        homeId: 6, 
                        awayId: 7, 
                        played: true, 
                        homeScore: 0, 
                        awayScore: 0, 
                        stats: { 
                            homePossession: 24, 
                            awayPossession: 76, 
                            homeShots: 0, 
                            awayShots: 4, 
                            homeShotsOnTarget: 0, 
                            awayShotsOnTarget: 2, 
                            homePasses: 35, 
                            awayPasses: 104, 
                            homeSuccessfulPasses: 21, 
                            awaySuccessfulPasses: 88, 
                            homeYellowCards: 0, 
                            homeRedCards: 0, 
                            awayYellowCards: 0, 
                            awayRedCards: 0 
                        } 
                    }, // Portugal 0-0 Netherlands (Portugal is home, Netherlands is away)
                    { id: 203, round: 2, homeId: 5, awayId: 7, played: false, homeScore: 0, awayScore: 0, stats: { homePossession: 50, awayPossession: 50, homeShots: 0, awayShots: 0, homeShotsOnTarget: 0, awayShotsOnTarget: 0, homePasses: 0, awayPasses: 0, homeSuccessfulPasses: 0, awaySuccessfulPasses: 0, homeYellowCards: 0, homeRedCards: 0, awayYellowCards: 0, awayRedCards: 0 } },
                    { 
                        id: 204, 
                        round: 2, 
                        homeId: 6, 
                        awayId: 8, 
                        played: true, 
                        homeScore: 1, 
                        awayScore: 2, 
                        stats: { 
                            homePossession: 44, 
                            awayPossession: 56, 
                            homeShots: 5, 
                            awayShots: 3, 
                            homeShotsOnTarget: 3, 
                            awayShotsOnTarget: 2, 
                            homePasses: 68, 
                            awayPasses: 104, 
                            homeSuccessfulPasses: 48, 
                            awaySuccessfulPasses: 83, 
                            homeYellowCards: 0, 
                            homeRedCards: 0, 
                            awayYellowCards: 0, 
                            awayRedCards: 0 
                        } 
                    }, // Portugal 1-2 Argentina (Portugal is home, Argentina is away)
                    { id: 205, round: 3, homeId: 5, awayId: 6, played: false, homeScore: 0, awayScore: 0, stats: { homePossession: 50, awayPossession: 50, homeShots: 0, awayShots: 0, homeShotsOnTarget: 0, awayShotsOnTarget: 0, homePasses: 0, awayPasses: 0, homeSuccessfulPasses: 0, awaySuccessfulPasses: 0, homeYellowCards: 0, homeRedCards: 0, awayYellowCards: 0, awayRedCards: 0 } },
                    { 
                        id: 206, 
                        round: 3, 
                        homeId: 8, 
                        awayId: 7, 
                        played: true, 
                        homeScore: 2, 
                        awayScore: 3, 
                        stats: { 
                            homePossession: 55, 
                            awayPossession: 45, 
                            homeShots: 3, 
                            awayShots: 4, 
                            homeShotsOnTarget: 2, 
                            awayShotsOnTarget: 3, 
                            homePasses: 120, 
                            awayPasses: 55, 
                            homeSuccessfulPasses: 98, 
                            awaySuccessfulPasses: 47, 
                            homeYellowCards: 0, 
                            homeRedCards: 0, 
                            awayYellowCards: 0, 
                            awayRedCards: 0 
                        } 
                    } // Argentina 2-3 Netherlands (Argentina is home, Netherlands is away)
                ],

                getTeamName(id) { return this.teams.find(t => t.id === id)?.name || 'Unknown'; },
                getPlayerName(id) { return this.teams.find(t => t.id === id)?.player || ''; },
                getTeamGroup(id) { return this.teams.find(t => t.id === id)?.group || ''; },

                getStandings(groupLetter) {
                    let groupTeams = this.teams.filter(t => t.group === groupLetter).map(t => ({
                        ...t, mp: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0
                    }));

                    this.matches.filter(m => m.played).forEach(m => {
                        let home = groupTeams.find(t => t.id === m.homeId);
                        let away = groupTeams.find(t => t.id === m.awayId);

                        if (home && away) {
                            home.mp++; away.mp++;
                            home.gf += m.homeScore; home.ga += m.awayScore;
                            away.gf += m.awayScore; away.ga += m.homeScore;

                            if (m.homeScore > m.awayScore) { home.w++; home.pts += 3; away.l++; }
                            else if (m.homeScore < m.awayScore) { away.w++; away.pts += 3; home.l++; }
                            else { home.d++; away.d++; home.pts += 1; away.pts += 1; }
                        }
                    });

                    groupTeams.forEach(t => t.gd = t.gf - t.ga);
                    return groupTeams.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
                },

                getTopScoringTeams() {
                    return this.teams.map(t => {
                        let goals = 0;
                        this.matches.filter(m => m.played).forEach(m => {
                            if (m.homeId === t.id) goals += m.homeScore;
                            if (m.awayId === t.id) goals += m.awayScore;
                        });
                        return { name: t.name, goals };
                    }).sort((a,b) => b.goals - a.goals).slice(0, 5);
                },

                getTopShootingTeams() {
                    return this.teams.map(t => {
                        let shots = 0;
                        let targetShots = 0;
                        this.matches.filter(m => m.played).forEach(m => {
                            if (m.homeId === t.id) {
                                shots += m.stats.homeShots;
                                targetShots += (m.stats.homeShotsOnTarget || 0);
                            }
                            if (m.awayId === t.id) {
                                shots += m.stats.awayShots;
                                targetShots += (m.stats.awayShotsOnTarget || 0);
                            }
                        });
                        return { name: t.name, shots, targetShots };
                    }).sort((a,b) => b.shots - a.shots).slice(0, 5);
                },

                getPassingStats() {
                    return this.teams.map(t => {
                        let totalPasses = 0;
                        let successfulPasses = 0;
                        this.matches.filter(m => m.played).forEach(m => {
                            if (m.homeId === t.id && m.stats.homePasses) {
                                totalPasses += m.stats.homePasses;
                                successfulPasses += m.stats.homeSuccessfulPasses;
                            }
                            if (m.awayId === t.id && m.stats.awayPasses) {
                                totalPasses += m.stats.awayPasses;
                                successfulPasses += m.stats.awaySuccessfulPasses;
                            }
                        });
                        let accuracy = totalPasses > 0 ? Math.round((successfulPasses / totalPasses) * 100) : 0;
                        return { name: t.name, accuracy, successful: successfulPasses, total: totalPasses };
                    }).sort((a,b) => b.accuracy - a.accuracy || b.successful - a.successful).slice(0, 5);
                }
            }
        }
    </script>

    <!-- Alpine.js (Loaded with defer so it executes safely AFTER tournamentApp is declared) -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

    <style>
        /* Touch scrollbar optimizations for dynamic tables */
        ::-webkit-scrollbar {
            height: 4px;
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 2px;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans antialiased" x-data="tournamentApp()">

    <!-- Header Navigation (Fully Responsive) -->
    <header class="bg-slate-950 border-b border-slate-800 sticky top-0 z-50 shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center gap-3">
            <div class="flex items-center gap-2.5">
                <div class="bg-emerald-500 text-slate-950 font-black px-2 py-0.5 rounded text-xs tracking-wider">EFOOTBALL</div>
                <h1 class="text-xl font-black tracking-tight text-white">THE LIGA <span class="text-emerald-400">WC26</span></h1>
            </div>
            
            <!-- Mobile-Friendly Navigation Segment with Adequate Tap Size -->
            <nav class="flex w-full md:w-auto bg-slate-900 p-1 rounded-lg border border-slate-800 text-center">
                <button @click="activeTab = 'standings'" 
                        :class="activeTab === 'standings' ? 'bg-emerald-500 text-slate-950 font-bold' : 'text-slate-400 hover:text-white'" 
                        class="flex-1 md:flex-none px-4 py-2 rounded-md text-xs sm:text-sm font-semibold transition duration-150 min-h-[44px]">
                    Standings
                </button>
                <button @click="activeTab = 'fixtures'" 
                        :class="activeTab === 'fixtures' ? 'bg-emerald-500 text-slate-950 font-bold' : 'text-slate-400 hover:text-white'" 
                        class="flex-1 md:flex-none px-4 py-2 rounded-md text-xs sm:text-sm font-semibold transition duration-150 min-h-[44px]">
                    Fixtures
                </button>
                <button @click="activeTab = 'stats'" 
                        :class="activeTab === 'stats' ? 'bg-emerald-500 text-slate-950 font-bold' : 'text-slate-400 hover:text-white'" 
                        class="flex-1 md:flex-none px-4 py-2 rounded-md text-xs sm:text-sm font-semibold transition duration-150 min-h-[44px]">
                    Stats
                </button>
            </nav>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-3 sm:px-4 py-6">
        
        <!-- 1. STANDINGS TAB -->
        <div x-show="activeTab === 'standings'" class="space-y-6" x-transition>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                
                <!-- Group A Standings -->
                <div class="bg-slate-950 rounded-xl border border-slate-800 p-4 sm:p-5 shadow-xl">
                    <h2 class="text-lg font-bold border-b border-slate-800 pb-2.5 mb-3 text-emerald-400 flex justify-between items-center">
                        <span class="flex items-center gap-1.5">🛡️ Group A</span>
                        <span class="text-[10px] text-slate-500 uppercase tracking-widest font-normal">Top 2 Qualify</span>
                    </h2>
                    
                    <div class="overflow-x-auto -mx-4 px-4 sm:mx-0 sm:px-0">
                        <table class="w-full text-left text-xs sm:text-sm min-w-[300px]">
                            <thead>
                                <tr class="text-slate-400 border-b border-slate-800 uppercase tracking-wider text-[10px]">
                                    <th class="pb-2 font-semibold">Team</th>
                                    <th class="pb-2 text-center w-8">MP</th>
                                    <th class="pb-2 text-center w-8">W</th>
                                    <th class="pb-2 text-center w-8">D</th>
                                    <th class="pb-2 text-center w-8">L</th>
                                    <th class="pb-2 text-center w-10">GD</th>
                                    <th class="pb-2 text-center w-10 text-emerald-400 font-bold">Pts</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="(team, index) in getStandings('A')" :key="team.id">
                                    <tr class="border-b border-slate-900 hover:bg-slate-900/50" :class="index < 2 ? 'bg-emerald-950/10' : ''">
                                        <td class="py-2.5 font-medium flex items-center gap-1.5">
                                            <span class="w-4 text-[10px] text-slate-500 font-mono" x-text="index + 1"></span>
                                            <div class="truncate max-w-[120px] sm:max-w-none">
                                                <div class="text-white font-bold truncate leading-tight" x-text="team.name"></div>
                                                <div class="text-[10px] text-slate-400 truncate" x-text="team.player"></div>
                                            </div>
                                        </td>
                                        <td class="py-2.5 text-center text-slate-300 font-mono" x-text="team.mp"></td>
                                        <td class="py-2.5 text-center font-mono" x-text="team.w"></td>
                                        <td class="py-2.5 text-center font-mono" x-text="team.d"></td>
                                        <td class="py-2.5 text-center font-mono" x-text="team.l"></td>
                                        <td class="py-2.5 text-center font-mono font-semibold" :class="team.gd > 0 ? 'text-emerald-400' : (team.gd < 0 ? 'text-rose-400' : 'text-slate-400')" x-text="(team.gd > 0 ? '+' : '') + team.gd"></td>
                                        <td class="py-2.5 text-center text-emerald-400 font-bold font-mono bg-slate-900/30 rounded" x-text="team.pts"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Group B Standings -->
                <div class="bg-slate-950 rounded-xl border border-slate-800 p-4 sm:p-5 shadow-xl">
                    <h2 class="text-lg font-bold border-b border-slate-800 pb-2.5 mb-3 text-emerald-400 flex justify-between items-center">
                        <span class="flex items-center gap-1.5">🛡️ Group B</span>
                        <span class="text-[10px] text-slate-500 uppercase tracking-widest font-normal">Top 2 Qualify</span>
                    </h2>
                    
                    <div class="overflow-x-auto -mx-4 px-4 sm:mx-0 sm:px-0">
                        <table class="w-full text-left text-xs sm:text-sm min-w-[300px]">
                            <thead>
                                <tr class="text-slate-400 border-b border-slate-800 uppercase tracking-wider text-[10px]">
                                    <th class="pb-2 font-semibold">Team</th>
                                    <th class="pb-2 text-center w-8">MP</th>
                                    <th class="pb-2 text-center w-8">W</th>
                                    <th class="pb-2 text-center w-8">D</th>
                                    <th class="pb-2 text-center w-8">L</th>
                                    <th class="pb-2 text-center w-10">GD</th>
                                    <th class="pb-2 text-center w-10 text-emerald-400 font-bold">Pts</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="(team, index) in getStandings('B')" :key="team.id">
                                    <tr class="border-b border-slate-900 hover:bg-slate-900/50" :class="index < 2 ? 'bg-emerald-950/10' : ''">
                                        <td class="py-2.5 font-medium flex items-center gap-1.5">
                                            <span class="w-4 text-[10px] text-slate-500 font-mono" x-text="index + 1"></span>
                                            <div class="truncate max-w-[120px] sm:max-w-none">
                                                <div class="text-white font-bold truncate leading-tight" x-text="team.name"></div>
                                                <div class="text-[10px] text-slate-400 truncate" x-text="team.player"></div>
                                            </div>
                                        </td>
                                        <td class="py-2.5 text-center text-slate-300 font-mono" x-text="team.mp"></td>
                                        <td class="py-2.5 text-center font-mono" x-text="team.w"></td>
                                        <td class="py-2.5 text-center font-mono" x-text="team.d"></td>
                                        <td class="py-2.5 text-center font-mono" x-text="team.l"></td>
                                        <td class="py-2.5 text-center font-mono font-semibold" :class="team.gd > 0 ? 'text-emerald-400' : (team.gd < 0 ? 'text-rose-400' : 'text-slate-400')" x-text="(team.gd > 0 ? '+' : '') + team.gd"></td>
                                        <td class="py-2.5 text-center text-emerald-400 font-bold font-mono bg-slate-900/30 rounded" x-text="team.pts"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- 2. FIXTURES TAB -->
        <div x-show="activeTab === 'fixtures'" class="space-y-6" x-transition>
            <div class="max-w-2xl mx-auto space-y-6">
                <template x-for="roundNum in [1, 2, 3]">
                    <div class="space-y-3">
                        <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 border-l-4 border-emerald-500 pl-2" x-text="'Round ' + roundNum"></h3>
                        
                        <div class="grid gap-3">
                            <template x-for="match in matches.filter(m => m.round === roundNum)" :key="match.id">
                                <div class="bg-slate-950 rounded-xl border border-slate-800 p-3.5 shadow hover:border-slate-700 transition duration-150">
                                    <div class="flex justify-between items-center text-[10px] text-slate-500 mb-2.5">
                                        <span class="font-bold tracking-wider text-emerald-500" x-text="'GROUP ' + getTeamGroup(match.homeId)"></span>
                                        <span class="px-2 py-0.5 rounded font-semibold tracking-wider uppercase" :class="match.played ? 'text-emerald-400 bg-emerald-950/20' : 'text-amber-400 bg-amber-950/20'" x-text="match.played ? 'Full Time' : 'Upcoming'"></span>
                                    </div>
                                    
                                    <!-- Highly Adaptable Scoreboard Area -->
                                    <div class="grid grid-cols-7 items-center gap-1">
                                        <!-- Home Team -->
                                        <div class="col-span-3 text-right">
                                            <span class="block font-black text-xs sm:text-sm text-white truncate" x-text="getTeamName(match.homeId)"></span>
                                            <span class="block text-[10px] text-slate-400 truncate" x-text="getPlayerName(match.homeId)"></span>
                                        </div>
                                        
                                        <!-- Centered Scores Badge -->
                                        <div class="col-span-1 bg-slate-900 py-1.5 rounded border border-slate-800 font-mono text-xs sm:text-sm font-bold flex justify-center items-center gap-0.5 min-w-[36px]">
                                            <span class="text-white" x-text="match.played ? match.homeScore : '-'"></span>
                                            <span class="text-slate-600 font-normal">:</span>
                                            <span class="text-white" x-text="match.played ? match.awayScore : '-'"></span>
                                        </div>
                                        
                                        <!-- Away Team -->
                                        <div class="col-span-3 text-left">
                                            <span class="block font-black text-xs sm:text-sm text-white truncate" x-text="getTeamName(match.awayId)"></span>
                                            <span class="block text-[10px] text-slate-400 truncate" x-text="getPlayerName(match.awayId)"></span>
                                        </div>
                                    </div>

                                    <!-- Compact Detailed Stats (Enhanced with shots on target & successful passes) -->
                                    <template x-if="match.played">
                                        <div class="mt-3 pt-3 border-t border-slate-900 text-[10px] text-slate-400 grid grid-cols-3 gap-y-1.5 max-w-sm mx-auto text-center font-medium">
                                            <!-- Possession Row -->
                                            <div><span class="font-mono text-white text-xs" x-text="match.stats.homePossession + '%'"></span></div>
                                            <div class="text-slate-500 uppercase tracking-widest text-[9px] font-bold">Possession</div>
                                            <div><span class="font-mono text-white text-xs" x-text="match.stats.awayPossession + '%'"></span></div>

                                            <!-- Shots Row -->
                                            <div>
                                                <span class="font-mono text-white text-xs" x-text="match.stats.homeShots"></span>
                                                <span class="text-slate-500" x-text="' (' + (match.stats.homeShotsOnTarget || 0) + ')'"></span>
                                            </div>
                                            <div class="text-slate-500 uppercase tracking-widest text-[9px] font-bold">Shots (On Target)</div>
                                            <div>
                                                <span class="font-mono text-white text-xs" x-text="match.stats.awayShots"></span>
                                                <span class="text-slate-500" x-text="' (' + (match.stats.awayShotsOnTarget || 0) + ')'"></span>
                                            </div>

                                            <!-- Passes Row -->
                                            <div>
                                                <span class="font-mono text-white text-xs" x-text="match.stats.homeSuccessfulPasses"></span>
                                                <span class="text-slate-500" x-text="'/' + match.stats.homePasses"></span>
                                                <span class="text-emerald-400 font-mono block text-[9px]" x-text="match.stats.homePasses > 0 ? Math.round((match.stats.homeSuccessfulPasses / match.stats.homePasses) * 100) + '%' : '0%'"></span>
                                            </div>
                                            <div class="text-slate-500 uppercase tracking-widest text-[9px] font-bold pt-1">Pass Completion</div>
                                            <div>
                                                <span class="font-mono text-white text-xs" x-text="match.stats.awaySuccessfulPasses"></span>
                                                <span class="text-slate-500" x-text="'/' + match.stats.awayPasses"></span>
                                                <span class="text-emerald-400 font-mono block text-[9px]" x-text="match.stats.awayPasses > 0 ? Math.round((match.stats.awaySuccessfulPasses / match.stats.awayPasses) * 100) + '%' : '0%'"></span>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- 3. STATS LEADERS TAB (Fully Responsive Grids) -->
        <div x-show="activeTab === 'stats'" class="grid grid-cols-1 md:grid-cols-3 gap-4 sm:gap-6" x-transition>
            <!-- Top Teams by Goals -->
            <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 shadow-xl flex flex-col justify-between">
                <div>
                    <h3 class="font-bold text-white text-sm mb-3 flex items-center gap-1.5">⚽ Top Scoring Teams</h3>
                    <ol class="space-y-1.5 text-xs sm:text-sm">
                        <template x-for="(stat, idx) in getTopScoringTeams()" :key="idx">
                            <li class="flex justify-between p-2 bg-slate-900 rounded items-center">
                                <span class="font-medium truncate pr-2" x-text="(idx+1) + '. ' + stat.name"></span>
                                <span class="font-bold text-emerald-400 font-mono shrink-0" x-text="stat.goals + ' G'"></span>
                            </li>
                        </template>
                    </ol>
                </div>
            </div>

            <!-- Attack/Shots Leaderboard -->
            <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 shadow-xl flex flex-col justify-between">
                <div>
                    <h3 class="font-bold text-white text-sm mb-3 flex items-center gap-1.5">🔥 Shot Generation & Target Rate</h3>
                    <ol class="space-y-1.5 text-xs sm:text-sm">
                        <template x-for="(stat, idx) in getTopShootingTeams()" :key="idx">
                            <li class="flex justify-between p-2 bg-slate-900 rounded items-center">
                                <span class="font-medium truncate pr-2" x-text="(idx+1) + '. ' + stat.name"></span>
                                <div class="text-right shrink-0">
                                    <span class="font-bold text-cyan-400 font-mono" x-text="stat.shots + ' S'"></span>
                                    <span class="text-[10px] text-slate-500 font-mono block" x-text="'Target: ' + stat.targetShots"></span>
                                </div>
                            </li>
                        </template>
                    </ol>
                </div>
            </div>

            <!-- Passing Accuracy Leaderboard (Replaced Disciplinary counter) -->
            <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 shadow-xl flex flex-col justify-between">
                <div>
                    <h3 class="font-bold text-white text-sm mb-3 flex items-center gap-1.5">🎯 Passing Accuracy</h3>
                    <ol class="space-y-1.5 text-xs sm:text-sm">
                        <template x-for="(stat, idx) in getPassingStats()" :key="idx">
                            <li class="flex justify-between p-2 bg-slate-900 rounded items-center">
                                <div class="truncate pr-2">
                                    <span class="font-medium" x-text="(idx+1) + '. ' + stat.name"></span>
                                    <span class="text-[9px] text-slate-500 block font-mono" x-text="'Comp: ' + stat.successful + '/' + stat.total"></span>
                                </div>
                                <span class="font-bold text-emerald-400 font-mono shrink-0 text-right text-xs sm:text-sm" x-text="stat.accuracy + '%'"></span>
                            </li>
                        </template>
                    </ol>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
