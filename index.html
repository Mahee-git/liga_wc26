<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0">
    <title>The LIGA WC26 | Tournament Dashboard</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- App State Engine (Defined BEFORE Alpine loads to prevent ReferenceErrors) -->
    <script>
        function tournamentApp() {
            return {
                activeTab: 'standings',
                teams: [
                    { id: 1, name: 'Germany', player: 'Reeshad', group: 'A' },
                    { id: 2, name: 'France', player: 'UltNB', group: 'A' },
                    { id: 3, name: 'England', player: 'Mahee', group: 'A' },
                    { id: 4, name: 'Brazil', player: 'Nino', group: 'A' },
                    { id: 5, name: 'Spain', player: 'OnionLarper', group: 'B' },
                    { id: 6, name: 'Portugal', player: 'Tassin', group: 'B' },
                    { id: 7, name: 'Netherlands', player: 'Aymaan', group: 'B' },
                    { id: 8, name: 'Argentina', player: 'Anas', group: 'B' }
                ],
                matches: [
                    // GROUP A FIXTURES
                    { id: 101, round: 1, homeId: 1, awayId: 4, played: false, homeScore: 0, awayScore: 0, stats: { homePossession: 50, awayPossession: 50, homeShots: 0, awayShots: 0, homeYellowCards: 0, homeRedCards: 0, awayYellowCards: 0, awayRedCards: 0 } },
                    { id: 102, round: 1, homeId: 2, awayId: 3, played: false, homeScore: 0, awayScore: 0, stats: { homePossession: 50, awayPossession: 50, homeShots: 0, awayShots: 0, homeYellowCards: 0, homeRedCards: 0, awayYellowCards: 0, awayRedCards: 0 } },
                    { id: 103, round: 2, homeId: 1, awayId: 3, played: false, homeScore: 0, awayScore: 0, stats: { homePossession: 50, awayPossession: 50, homeShots: 0, awayShots: 0, homeYellowCards: 0, homeRedCards: 0, awayYellowCards: 0, awayRedCards: 0 } },
                    { id: 104, round: 2, homeId: 2, awayId: 4, played: false, homeScore: 0, awayScore: 0, stats: { homePossession: 50, awayPossession: 50, homeShots: 0, awayShots: 0, homeYellowCards: 0, homeRedCards: 0, awayYellowCards: 0, awayRedCards: 0 } },
                    { id: 105, round: 3, homeId: 1, awayId: 2, played: false, homeScore: 0, awayScore: 0, stats: { homePossession: 50, awayPossession: 50, homeShots: 0, awayShots: 0, homeYellowCards: 0, homeRedCards: 0, awayYellowCards: 0, awayRedCards: 0 } },
                    { id: 106, round: 3, homeId: 4, awayId: 3, played: false, homeScore: 0, awayScore: 0, stats: { homePossession: 50, awayPossession: 50, homeShots: 0, awayShots: 0, homeYellowCards: 0, homeRedCards: 0, awayYellowCards: 0, awayRedCards: 0 } },

                    // GROUP B FIXTURES
                    { id: 201, round: 1, homeId: 5, awayId: 8, played: false, homeScore: 0, awayScore: 0, stats: { homePossession: 50, awayPossession: 50, homeShots: 0, awayShots: 0, homeYellowCards: 0, homeRedCards: 0, awayYellowCards: 0, awayRedCards: 0 } },
                    { id: 202, round: 1, homeId: 6, awayId: 7, played: false, homeScore: 0, awayScore: 0, stats: { homePossession: 50, awayPossession: 50, homeShots: 0, awayShots: 0, homeYellowCards: 0, homeRedCards: 0, awayYellowCards: 0, awayRedCards: 0 } },
                    { id: 203, round: 2, homeId: 5, awayId: 7, played: false, homeScore: 0, awayScore: 0, stats: { homePossession: 50, awayPossession: 50, homeShots: 0, awayShots: 0, homeYellowCards: 0, homeRedCards: 0, awayYellowCards: 0, awayRedCards: 0 } },
                    { id: 204, round: 2, homeId: 6, awayId: 8, played: false, homeScore: 0, awayScore: 0, stats: { homePossession: 50, awayPossession: 50, homeShots: 0, awayShots: 0, homeYellowCards: 0, homeRedCards: 0, awayYellowCards: 0, awayRedCards: 0 } },
                    { id: 205, round: 3, homeId: 5, awayId: 6, played: false, homeScore: 0, awayScore: 0, stats: { homePossession: 50, awayPossession: 50, homeShots: 0, awayShots: 0, homeYellowCards: 0, homeRedCards: 0, awayYellowCards: 0, awayRedCards: 0 } },
                    { id: 206, round: 3, homeId: 8, awayId: 7, played: false, homeScore: 0, awayScore: 0, stats: { homePossession: 50, awayPossession: 50, homeShots: 0, awayShots: 0, homeYellowCards: 0, homeRedCards: 0, awayYellowCards: 0, awayRedCards: 0 } }
                ],

                getTeamName(id) { return this.teams.find(t => t.id === id)?.name || 'Unknown'; },
                getPlayerName(id) { return this.teams.find(t => t.id === id)?.player || ''; },
                getTeamGroup(id) { return this.teams.find(t => t.id === id)?.group || ''; },

                getStandings(groupLetter) {
                    let groupTeams = this.teams.filter(t => t.group === groupLetter).map(t => ({
                        ...t, mp: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0
                    }));

                    this.matches.filter(m => m.played).forEach(m => {
                        let home = groupTeams.find(t => t.id === m.homeId);
                        let away = groupTeams.find(t => t.id === m.awayId);

                        if (home && away) {
                            home.mp++; away.mp++;
                            home.gf += m.homeScore; home.ga += m.awayScore;
                            away.gf += m.awayScore; away.ga += m.homeScore;

                            if (m.homeScore > m.awayScore) { home.w++; home.pts += 3; away.l++; }
                            else if (m.homeScore < m.awayScore) { away.w++; away.pts += 3; home.l++; }
                            else { home.d++; away.d++; home.pts += 1; away.pts += 1; }
                        }
                    });

                    groupTeams.forEach(t => t.gd = t.gf - t.ga);
                    return groupTeams.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
                },

                getTopScoringTeams() {
                    return this.teams.map(t => {
                        let goals = 0;
                        this.matches.filter(m => m.played).forEach(m => {
                            if (m.homeId === t.id) goals += m.homeScore;
                            if (m.awayId === t.id) goals += m.awayScore;
                        });
                        return { name: t.name, goals };
                    }).sort((a,b) => b.goals - a.goals).slice(0, 5);
                },
                getTopShootingTeams() {
                    return this.teams.map(t => {
                        let shots = 0;
                        this.matches.filter(m => m.played).forEach(m => {
                            if (m.homeId === t.id) shots += m.stats.homeShots;
                            if (m.awayId === t.id) shots += m.stats.awayShots;
                        });
                        return { name: t.name, shots };
                    }).sort((a,b) => b.shots - a.shots).slice(0, 5);
                },
                getCardStats() {
                    return this.teams.map(t => {
                        let yellow = 0, red = 0;
                        this.matches.filter(m => m.played).forEach(m => {
                            if (m.homeId === t.id) { yellow += m.stats.homeYellowCards; red += m.stats.homeRedCards; }
                            if (m.awayId === t.id) { yellow += m.stats.awayYellowCards; red += m.stats.awayRedCards; }
                        });
                        return { name: t.name, yellow, red };
                    }).sort((a,b) => (b.red * 3 + b.yellow) - (a.red * 3 + a.yellow)).slice(0, 5);
                }
            }
        }
    </script>

    <!-- Alpine.js (Loaded with defer so it executes safely AFTER tournamentApp is declared) -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        /* Touch scrollbar optimizations for dynamic tables */
        ::-webkit-scrollbar {
            height: 4px;
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 2px;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans antialiased" x-data="tournamentApp()">

    <!-- Header Navigation (Fully Responsive) -->
    <header class="bg-slate-950 border-b border-slate-800 sticky top-0 z-50 shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center gap-3">
            <div class="flex items-center gap-2.5">
                <div class="bg-emerald-500 text-slate-950 font-black px-2 py-0.5 rounded text-xs tracking-wider">EFOOTBALL</div>
                <h1 class="text-xl font-black tracking-tight text-white">THE LIGA <span class="text-emerald-400">WC26</span></h1>
            </div>
            
            <!-- Mobile-Friendly Navigation Segment with Adequate Tap Size -->
            <nav class="flex w-full md:w-auto bg-slate-900 p-1 rounded-lg border border-slate-800 text-center">
                <button @click="activeTab = 'standings'" 
                        :class="activeTab === 'standings' ? 'bg-emerald-500 text-slate-950 font-bold' : 'text-slate-400 hover:text-white'" 
                        class="flex-1 md:flex-none px-3 py-2.5 rounded-md text-xs sm:text-sm transition duration-150 min-h-[44px]">
                    Standings
                </button>
                <button @click="activeTab = 'fixtures'" 
                        :class="activeTab === 'fixtures' ? 'bg-emerald-500 text-slate-950 font-bold' : 'text-slate-400 hover:text-white'" 
                        class="flex-1 md:flex-none px-3 py-2.5 rounded-md text-xs sm:text-sm transition duration-150 min-h-[44px]">
                    Fixtures
                </button>
                <button @click="activeTab = 'stats'" 
                        :class="activeTab === 'stats' ? 'bg-emerald-500 text-slate-950 font-bold' : 'text-slate-400 hover:text-white'" 
                        class="flex-1 md:flex-none px-3 py-2.5 rounded-md text-xs sm:text-sm transition duration-150 min-h-[44px]">
                    Stats
                </button>
            </nav>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-3 sm:px-4 py-6">
        
        <!-- 1. STANDINGS TAB -->
        <div x-show="activeTab === 'standings'" class="space-y-6" x-transition>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                
                <!-- Group A Standings -->
                <div class="bg-slate-950 rounded-xl border border-slate-800 p-4 sm:p-5 shadow-xl">
                    <h2 class="text-lg font-bold border-b border-slate-800 pb-2.5 mb-3 text-emerald-400 flex justify-between items-center">
                        <span class="flex items-center gap-1.5">🛡️ Group A</span>
                        <span class="text-[10px] text-slate-500 uppercase tracking-widest font-normal">Top 2 Qualify</span>
                    </h2>
                    
                    <div class="overflow-x-auto -mx-4 px-4 sm:mx-0 sm:px-0">
                        <table class="w-full text-left text-xs sm:text-sm min-w-[300px]">
                            <thead>
                                <tr class="text-slate-400 border-b border-slate-800 uppercase tracking-wider text-[10px]">
                                    <th class="pb-2 font-semibold">Team</th>
                                    <th class="pb-2 text-center w-8">MP</th>
                                    <th class="pb-2 text-center w-8">W</th>
                                    <th class="pb-2 text-center w-8">D</th>
                                    <th class="pb-2 text-center w-8">L</th>
                                    <th class="pb-2 text-center w-10">GD</th>
                                    <th class="pb-2 text-center w-10 text-emerald-400 font-bold">Pts</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="(team, index) in getStandings('A')" :key="team.id">
                                    <tr class="border-b border-slate-900 hover:bg-slate-900/50" :class="index < 2 ? 'bg-emerald-950/10' : ''">
                                        <td class="py-2.5 font-medium flex items-center gap-1.5">
                                            <span class="w-4 text-[10px] text-slate-500 font-mono" x-text="index + 1"></span>
                                            <div class="truncate max-w-[120px] sm:max-w-none">
                                                <div class="text-white font-bold truncate leading-tight" x-text="team.name"></div>
                                                <div class="text-[10px] text-slate-400 truncate" x-text="team.player"></div>
                                            </div>
                                        </td>
                                        <td class="py-2.5 text-center text-slate-300 font-mono" x-text="team.mp"></td>
                                        <td class="py-2.5 text-center font-mono" x-text="team.w"></td>
                                        <td class="py-2.5 text-center font-mono" x-text="team.d"></td>
                                        <td class="py-2.5 text-center font-mono" x-text="team.l"></td>
                                        <td class="py-2.5 text-center font-mono font-semibold" :class="team.gd > 0 ? 'text-emerald-400' : (team.gd < 0 ? 'text-rose-400' : 'text-slate-400')" x-text="(team.gd > 0 ? '+' : '') + team.gd"></td>
                                        <td class="py-2.5 text-center text-emerald-400 font-bold font-mono bg-slate-900/30 rounded" x-text="team.pts"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Group B Standings -->
                <div class="bg-slate-950 rounded-xl border border-slate-800 p-4 sm:p-5 shadow-xl">
                    <h2 class="text-lg font-bold border-b border-slate-800 pb-2.5 mb-3 text-emerald-400 flex justify-between items-center">
                        <span class="flex items-center gap-1.5">🛡️ Group B</span>
                        <span class="text-[10px] text-slate-500 uppercase tracking-widest font-normal">Top 2 Qualify</span>
                    </h2>
                    
                    <div class="overflow-x-auto -mx-4 px-4 sm:mx-0 sm:px-0">
                        <table class="w-full text-left text-xs sm:text-sm min-w-[300px]">
                            <thead>
                                <tr class="text-slate-400 border-b border-slate-800 uppercase tracking-wider text-[10px]">
                                    <th class="pb-2 font-semibold">Team</th>
                                    <th class="pb-2 text-center w-8">MP</th>
                                    <th class="pb-2 text-center w-8">W</th>
                                    <th class="pb-2 text-center w-8">D</th>
                                    <th class="pb-2 text-center w-8">L</th>
                                    <th class="pb-2 text-center w-10">GD</th>
                                    <th class="pb-2 text-center w-10 text-emerald-400 font-bold">Pts</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="(team, index) in getStandings('B')" :key="team.id">
                                    <tr class="border-b border-slate-900 hover:bg-slate-900/50" :class="index < 2 ? 'bg-emerald-950/10' : ''">
                                        <td class="py-2.5 font-medium flex items-center gap-1.5">
                                            <span class="w-4 text-[10px] text-slate-500 font-mono" x-text="index + 1"></span>
                                            <div class="truncate max-w-[120px] sm:max-w-none">
                                                <div class="text-white font-bold truncate leading-tight" x-text="team.name"></div>
                                                <div class="text-[10px] text-slate-400 truncate" x-text="team.player"></div>
                                            </div>
                                        </td>
                                        <td class="py-2.5 text-center text-slate-300 font-mono" x-text="team.mp"></td>
                                        <td class="py-2.5 text-center font-mono" x-text="team.w"></td>
                                        <td class="py-2.5 text-center font-mono" x-text="team.d"></td>
                                        <td class="py-2.5 text-center font-mono" x-text="team.l"></td>
                                        <td class="py-2.5 text-center font-mono font-semibold" :class="team.gd > 0 ? 'text-emerald-400' : (team.gd < 0 ? 'text-rose-400' : 'text-slate-400')" x-text="(team.gd > 0 ? '+' : '') + team.gd"></td>
                                        <td class="py-2.5 text-center text-emerald-400 font-bold font-mono bg-slate-900/30 rounded" x-text="team.pts"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- 2. FIXTURES TAB -->
        <div x-show="activeTab === 'fixtures'" class="space-y-6" x-transition>
            <div class="max-w-2xl mx-auto space-y-6">
                <template x-for="roundNum in [1, 2, 3]">
                    <div class="space-y-3">
                        <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 border-l-4 border-emerald-500 pl-2" x-text="'Round ' + roundNum"></h3>
                        
                        <div class="grid gap-3">
                            <template x-for="match in matches.filter(m => m.round === roundNum)" :key="match.id">
                                <div class="bg-slate-950 rounded-xl border border-slate-800 p-3.5 shadow hover:border-slate-700 transition duration-150">
                                    <div class="flex justify-between items-center text-[10px] text-slate-500 mb-2.5">
                                        <span class="font-bold tracking-wider text-emerald-500" x-text="'GROUP ' + getTeamGroup(match.homeId)"></span>
                                        <span class="px-2 py-0.5 rounded font-semibold tracking-wider uppercase" :class="match.played ? 'text-emerald-400 bg-emerald-950/20' : 'text-amber-400 bg-amber-950/20'" x-text="match.played ? 'Full Time' : 'Upcoming'"></span>
                                    </div>
                                    
                                    <!-- Highly Adaptable Scoreboard Area -->
                                    <div class="grid grid-cols-7 items-center gap-1">
                                        <!-- Home Team -->
                                        <div class="col-span-3 text-right">
                                            <span class="block font-black text-xs sm:text-sm text-white truncate" x-text="getTeamName(match.homeId)"></span>
                                            <span class="block text-[10px] text-slate-400 truncate" x-text="getPlayerName(match.homeId)"></span>
                                        </div>
                                        
                                        <!-- Centered Scores Badge -->
                                        <div class="col-span-1 bg-slate-900 py-1.5 rounded border border-slate-800 font-mono text-xs sm:text-sm font-bold flex justify-center items-center gap-0.5 min-w-[36px]">
                                            <span class="text-white" x-text="match.played ? match.homeScore : '-'"></span>
                                            <span class="text-slate-600 font-normal">:</span>
                                            <span class="text-white" x-text="match.played ? match.awayScore : '-'"></span>
                                        </div>
                                        
                                        <!-- Away Team -->
                                        <div class="col-span-3 text-left">
                                            <span class="block font-black text-xs sm:text-sm text-white truncate" x-text="getTeamName(match.awayId)"></span>
                                            <span class="block text-[10px] text-slate-400 truncate" x-text="getPlayerName(match.awayId)"></span>
                                        </div>
                                    </div>

                                    <!-- Compact Detailed Stats -->
                                    <template x-if="match.played">
                                        <div class="mt-3 pt-3 border-t border-slate-900 text-[10px] text-slate-400 grid grid-cols-3 gap-y-1.5 max-w-sm mx-auto text-center font-medium">
                                            <div><span class="font-mono" x-text="match.stats.homePossession + '%'"></span></div>
                                            <div class="text-slate-500 uppercase tracking-widest text-[9px] font-bold">Possession</div>
                                            <div><span class="font-mono" x-text="match.stats.awayPossession + '%'"></span></div>

                                            <div><span class="font-mono" x-text="match.stats.homeShots"></span></div>
                                            <div class="text-slate-500 uppercase tracking-widest text-[9px] font-bold">Shots</div>
                                            <div><span class="font-mono" x-text="match.stats.awayShots"></span></div>

                                            <div>
                                                <span class="font-mono" x-text="match.stats.homeYellowCards"></span> 🟨
                                                <span class="font-mono text-slate-700 mx-0.5">/</span>
                                                <span class="font-mono" x-text="match.stats.homeRedCards"></span> 🟥
                                            </div>
                                            <div class="text-slate-500 uppercase tracking-widest text-[9px] font-bold">Cards</div>
                                            <div>
                                                <span class="font-mono" x-text="match.stats.awayYellowCards"></span> 🟨
                                                <span class="font-mono text-slate-700 mx-0.5">/</span>
                                                <span class="font-mono" x-text="match.stats.awayRedCards"></span> 🟥
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- 3. STATS LEADERS TAB (Fully Responsive Grids) -->
        <div x-show="activeTab === 'stats'" class="grid grid-cols-1 md:grid-cols-3 gap-4 sm:gap-6" x-transition>
            <!-- Top Teams by Goals -->
            <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 shadow-xl">
                <h3 class="font-bold text-white text-sm mb-3 flex items-center gap-1.5">⚽ Top Scoring Teams</h3>
                <ol class="space-y-1.5 text-xs sm:text-sm">
                    <template x-for="(stat, idx) in getTopScoringTeams()" :key="idx">
                        <li class="flex justify-between p-2 bg-slate-900 rounded items-center">
                            <span class="font-medium truncate pr-2" x-text="(idx+1) + '. ' + stat.name"></span>
                            <span class="font-bold text-emerald-400 font-mono shrink-0" x-text="stat.goals + ' G'"></span>
                        </li>
                    </template>
                </ol>
            </div>

            <!-- Attack/Shots Leaderboard -->
            <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 shadow-xl">
                <h3 class="font-bold text-white text-sm mb-3 flex items-center gap-1.5">🔥 Highest Shot Output</h3>
                <ol class="space-y-1.5 text-xs sm:text-sm">
                    <template x-for="(stat, idx) in getTopShootingTeams()" :key="idx">
                        <li class="flex justify-between p-2 bg-slate-900 rounded items-center">
                            <span class="font-medium truncate pr-2" x-text="(idx+1) + '. ' + stat.name"></span>
                            <span class="font-bold text-cyan-400 font-mono shrink-0" x-text="stat.shots + ' S'"></span>
                        </li>
                    </template>
                </ol>
            </div>

            <!-- Disciplinary Card Counter -->
            <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 shadow-xl">
                <h3 class="font-bold text-white text-sm mb-3 flex items-center gap-1.5">🟥 Disciplinary Record</h3>
                <ol class="space-y-1.5 text-xs sm:text-sm">
                    <template x-for="(stat, idx) in getCardStats()" :key="idx">
                        <li class="flex justify-between p-2 bg-slate-900 rounded items-center">
                            <span class="font-medium truncate pr-2" x-text="(idx+1) + '. ' + stat.name"></span>
                            <span class="font-mono text-[10px] shrink-0 flex gap-1">
                                <span class="bg-amber-500/20 text-amber-400 px-1 py-0.5 rounded font-bold" x-text="stat.yellow + ' 🟨'"></span>
                                <span class="bg-rose-500/20 text-rose-400 px-1 py-0.5 rounded font-bold" x-text="stat.red + ' 🟥'"></span>
                            </span>
                        </li>
                    </template>
                </ol>
            </div>
        </div>
    </main>
</body>
</html>
